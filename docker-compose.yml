  treinamento:
    build: .
    container_name: treinamento
    restart: unless-stopped
    command: bash -c "sleep 450 && python main.py"
    env_file: ./envs/hk.env
    volumes:
      - ./treinamento:/app
      - ./shared:/shared:ro
      - ./credentials.json:/app/credentials.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.treinamento.schedule: "@every 30m"
      ofelia.job-exec.treinamento.command: "python main.py"

