x-job-base: &job-base
  build: .
  restart: unless-stopped
  command: ["tail", "-f", "/dev/null"]
  volumes:
    - ./shared:/shared:ro
    - ./credentials.json:/app/credentials.json:ro
  environment:
    GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
  labels:
    ofelia.enabled: "true"

x-hcm-env: &hcm-env
  env_file: ./envs/hcm.env

x-hk-env: &hk-env
  env_file: ./envs/hk.env

services:
  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ofelia
    restart: unless-stopped
    profiles: ["scheduler"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro

  admissao_hcm:
    <<: [*job-base, *hcm-env]
    container_name: admissao_hcm
    working_dir: /app
    volumes:
      - ./admissao_hcm:/app
      - ./shared:/shared:ro
      - ./credentials.json:/app/credentials.json:ro
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.admissao_hcm.schedule: "@every 30m"
      ofelia.job-exec.admissao_hcm.command: "python main.py"

  exportar_folha_hcm:
    <<: [*job-base, *hcm-env]
    container_name: exportar_folha_hcm
    working_dir: /app
    volumes:
