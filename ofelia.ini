# ofelia.ini — Documentação dos agendamentos
# O Ofelia lê os schedules direto dos labels do docker-compose.yml
# Este arquivo serve como referência e backup
#
# Formato:
#   @every 30m  → a cada 30 minutos
#   @every 1h   → a cada 1 hora
#   0 8 * * *   → todo dia às 08:00 (cron padrão)

