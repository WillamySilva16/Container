# Ofelia schedule reference
#
# The active schedules are configured as labels in docker-compose.yml.
# This file is intentionally kept without active jobs so starting Ofelia
# cannot accidentally run a duplicated or outdated schedule.
#
# To enable scheduling:
#   docker compose --profile scheduler up -d
#
# To run one job manually:
#   docker compose exec treinamento python main.py

; [job-exec "admissao_hcm"]
; schedule = @every 30m
; container = admissao_hcm
; command = python main.py

; [job-exec "exportar_folha_hcm"]
; schedule = @every 5m
; container = exportar_folha_hcm
; command = python main.py

; [job-exec "folha_hcm"]
; schedule = @every 1h
; container = folha_hcm
; command = python main.py

